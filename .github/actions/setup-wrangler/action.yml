name: "Setup Wrangler"
description: "Generate wrangler.toml for CI builds"

inputs:
  mode:
    description: "Build mode (dry-run or deploy)"
    required: false
    default: "dry-run"

runs:
  using: "composite"
  steps:
    - name: Generate wrangler.toml
      shell: bash
      run: |
        cat > wrangler.toml << 'EOF'
        #:schema node_modules/wrangler/config-schema.json
        name = "chenpybara-rin-server"
        main = "server/src/_worker.ts"
        compatibility_date = "2025-03-21"

        [assets]
        directory = "./dist/client"
        binding = "ASSETS"
        run_worker_first = true
        not_found_handling = "single-page-application"

        [triggers]
        crons = ["*/20 * * * *"]

        [vars]
        S3_FOLDER = "images/"
        S3_CACHE_FOLDER = "cache/"
        S3_REGION = "auto"
        S3_ENDPOINT = "https://example.s3.endpoint"
        S3_ACCESS_HOST = "https://example.s3.endpoint"
        S3_BUCKET = "rin-bucket"
        S3_FORCE_PATH_STYLE = "false"
        RSS_TITLE = "chenpybara Video Notes"
        RSS_DESCRIPTION = "A dynamic video-first blog by chenpybara, powered by Rin and Cloudflare."
        CACHE_STORAGE_MODE = "database"

        [[d1_databases]]
        binding = "DB"
        database_name = "chenpybara_rin"
        database_id = "local"

        [[queues.producers]]
        binding = "TASK_QUEUE"
        queue = "rin-tasks"

        [[queues.consumers]]
        queue = "rin-tasks"
        max_batch_size = 1
        max_batch_timeout = 5
        EOF
        echo "Generated wrangler.toml for ${{ inputs.mode }}"
